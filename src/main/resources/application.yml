server:
  error:
    whitelabel:
      enabled: false   # 关闭 Whitelabel Error Page

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/test?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  session:
    store-type: jdbc          # 配合 spring-boot-starter-session-jdbc
    jdbc:
      initialize-schema: always  # 自动建 session 表（首次运行）

  #  autoconfigure:
  #    exclude:
  #      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
  #      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  #      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false   # 禁用静态资源映射，纯 API 才开

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.example.demo.entity
  configuration:
    map-underscore-to-camel-case: true   # 下划线转驼峰：user_name → userName
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 控制台打印 SQL

enterprise:
  name: tony
  age: 18
  tel: 122
